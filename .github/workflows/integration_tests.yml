name: Integration Tests

# All tests in this file: 
# 1. Run against every PR
# 2. Do not require AWS credentials (We only run the tests that require credentials on code that has been approved and merged to main)

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

